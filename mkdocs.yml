site_name: MITF Voucher Provider Documentation
site_description: Technical documentation for the MITF Voucher Provider workspace
site_url: https://safoosafa.github.io/VoucherManagement-docs/
repo_url: https://github.com/SafOosafa/VoucherManagement-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  favicon: LogoPH.png
  logo: LogoPH.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.sticky
    - search.highlight
    - search.share
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SafOosafa/VoucherManagement-docs
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/anstwechy
  consent:
    title: Cookie consent
    description: This site uses cookies from Google Analytics for usage tracking.

copyright: Copyright &copy; 2026 Masarat

plugins:
  - search
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - def_list
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

